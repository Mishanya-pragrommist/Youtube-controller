<!DOCTYPE html>

<html lang="en">
<head>
    <title>YouTube controller extention</title>
    <link rel="stylesheet" type="text/css" href="styles.css">

<body>
    <h1>YouTube Controller</h1>
    <p>Choose blocking mode</p>
    
    <form form-js>
        <section options-block>
            <div class="option-row">
                <div class="radio-btn-block">
                    <input type="radio" 
                           name="preference"
                           id="option1"
                           value="block-ytb-entirely" 
                           checked
                           block-ytb-entirely>
                    <label for="option1">Block YouTube entirely</label>
                </div>
                <!-- TODO: implement showing info when hovering "INFO" -->
                <!-- <p class="info">info</p> -->
            </div>

            <div class="option-row">
                <div class="radio-btn-block">
                    <input type="radio" 
                           name="preference"
                           id="option2"
                           value="focus-mode"
                           focus-mode>
                    <label for="option2">Focus mode</label>
                </div>
                <!-- 
                <p class="info">info</p>
                <p class="info">Block all Youtube functions 
                    so you can't doom scroll</p> -->
            </div>
            
            <div class="time-input-block option-row"
                 time-input-block>
                <input id="time-input"
                       class="time-input"
                       name="time-input"
                       type="time"
                       value="00:00:00" 
                       step="1"
                       time-input>
                <label for="time-input" class="time-input-label">Blocking/focus time (if 0:0:0, then until you press 'stop')</label>
            </div>

        </section>
