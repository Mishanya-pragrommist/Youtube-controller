<!DOCTYPE html>

<html lang="en">
<head>
    <title>YouTube controller extention</title>
    <link rel="stylesheet" href="styles.css">
</head>
    
<body>
    <h1>YouTube Controller</h1>
    <p>Choose blocking mode</p>
    <form form-block>
        <section>
            <div>
                <input type="radio" 
                       name="preference"
                       value="block-ytb-entirely" 
                       checked
                       block-ytb-entirely>
                <label for="preference">Block YouTube entirely</label>
            </div>

            <div>
                <input type="radio" 
                       name="preference"
                       value="focus-mode"
                       focus-mode>
                <label for="preference">Focus mode</label>
            </div>
                
            <!--Is invisible when focus mode is not checked-->
            <div class="time-input-block">
                <input class="time-input" 
                       type="time"
                       value="00:00:00" 
                       step="1"
                       time-input>
                <label for="time-input" class="time-input-label">Focus time</label>
            </div>
            
            <div>
                <input type="radio" 
                       name="preference"
                       value="custom-settings"
                       custom-settings>
                <label for="preference">Custom settings</label>
            </div>        
        </section>
        
        <section class="custom-settings-section">
            <h2>Choose what exactly to block</h2>
            
            <div>
                <input type="checkbox" name="content-feed">
                <label for="content-feed">Content feed</label>
            </div>
            
            <div>
                <input type="checkbox" name="shorts">
                <label for="shorts">YouTube Shorts</label>
            </div>

            <div class="videos-num-block">
                <input class="videos-num-input" 
                       type="number"
                       name="videos-number"
                       value="0"
                       min="0">
                <label for="videos-number">Videos num that can be shown</label>
            </div>

            <div>
                <input type="checkbox" name="recommendations">
                <label for="recommendations">Recommendations</label>
            </div>

            <div>
                <input name="left-panel" 
                       type="checkbox">
                <label for="left-panel">Left panel</label>
            </div>

            <div>
                <input name="notifications" 
                       type="checkbox">
                <label for="notifications">Notifications</label>
            </div>

            <div>
                <button>Reset settings</button>
            </div>
        </section>
        
        
        <div class="buttons-row">
            <button type="submit" block-btn>Block it</button>
            <button type="submit" focus-btn>Start working</button>
            <button stop-btn>Stop blocking</button>
        </div>
    </form>
    
    <script src="scripts.js"></script>
</body>
    
</html>
